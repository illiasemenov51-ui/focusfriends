server:
  port: 8084

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USER:focusfriends}
    password: ${DB_PASSWORD:focusfriends}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

app:
  # В MVP реальная отправка email не обязательна: если SMTP недоступен,
  # уведомление всё равно сохраняется как IN_APP, а ошибка отправки только логируется.
  mail-enabled: ${MAIL_ENABLED:false}
  mail-from: ${MAIL_FROM:noreply@focusfriends.dev}
  mail-to: ${MAIL_TO:}

logging:
  level:
    dev.illiasemenov.focusfriends: DEBUG
