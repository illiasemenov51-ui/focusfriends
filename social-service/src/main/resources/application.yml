server:
  port: 8083

spring:
  application:
    name: social-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:social_db}
    username: ${DB_USER:focusfriends}
    password: ${DB_PASSWORD:focusfriends}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}

logging:
  level:
    dev.illiasemenov.focusfriends: DEBUG

internal:
  # Общий секрет с gateway. Запросы без него отклоняются (403) — защита от
  # подделки X-User-Id при прямом сетевом доступе к сервису, минуя gateway.
  shared-secret: ${INTERNAL_SHARED_SECRET:dev-only-internal-secret-change-me-in-production}
