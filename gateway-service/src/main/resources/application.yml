server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          order: 0
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: core-service
          uri: ${CORE_SERVICE_URL:http://localhost:8082}
          order: 0
          predicates:
            - Path=/api/tasks/**,/api/habits/**

        - id: social-service
          uri: ${SOCIAL_SERVICE_URL:http://localhost:8083}
          order: 0
          predicates:
            - Path=/api/friends/**,/api/groups/**,/api/leaderboard/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          order: 0
          predicates:
            - Path=/api/notifications/**

        - id: health-service
          uri: ${HEALTH_SERVICE_URL:http://localhost:8085}
          order: 0
          predicates:
            - Path=/api/health/**

        - id: frontend
          uri: ${FRONTEND_URL:http://localhost:3000}
          order: 100
          predicates:
            - Path=/**

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-change-me-in-production-please-32bytes}
  auth-service:
    # тот же адрес, что и в маршруте auth-service выше — используется для
    # проверки персональных API-токенов (X-Api-Token), напрямую, без роутинга
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  public-paths:
    - /api/auth/register
    - /api/auth/login
    - /api/auth/refresh
  internal:
    # Общий секрет с downstream-сервисами. Gateway добавляет его в каждый запрос,
    # который сам проверил (JWT/API-токен) — downstream-сервисы отклоняют запросы
    # без него, чтобы X-User-Id нельзя было подделать в обход gateway.
    shared-secret: ${INTERNAL_SHARED_SECRET:dev-only-internal-secret-change-me-in-production}
    # Пути, которые существуют ТОЛЬКО для вызовов сервис-сервис напрямую (минуя
    # gateway) и никогда не должны быть доступны внешнему клиенту, даже с валидным JWT.
    service-only-paths:
      - /api/leaderboard/points
      - /api/notifications/send

logging:
  level:
    dev.illiasemenov.focusfriends: DEBUG
    org.springframework.cloud.gateway: INFO
