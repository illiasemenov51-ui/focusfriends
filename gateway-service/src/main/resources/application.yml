server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: core-service
          uri: ${CORE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/tasks/**,/api/habits/**

        - id: social-service
          uri: ${SOCIAL_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/friends/**,/api/groups/**,/api/leaderboard/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-change-me-in-production-please-32bytes}
  public-paths:
    - /api/auth/register
    - /api/auth/login
    - /api/auth/refresh

logging:
  level:
    dev.illiasemenov.focusfriends: DEBUG
    org.springframework.cloud.gateway: INFO
