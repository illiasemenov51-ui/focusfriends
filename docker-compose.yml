version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: focusfriends-postgres
    environment:
      POSTGRES_USER: focusfriends
      POSTGRES_PASSWORD: focusfriends
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusfriends -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: focusfriends-auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: focusfriends
      DB_PASSWORD: focusfriends
      JWT_SECRET: ${JWT_SECRET:-this-is-a-dev-only-secret-key-change-me-in-production-please-32bytes}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-dev-only-internal-secret-change-me-in-production}
    # Не публикуем порт на хост: наружу сервис должен быть доступен только через
    # gateway-service. "expose" делает порт видимым другим контейнерам в той же
    # docker-сети, но не на хосте/интернете.
    expose:
      - "8081"

  core-service:
    build: ./core-service
    container_name: focusfriends-core-service
    depends_on:
      postgres:
        condition: service_healthy
      social-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: core_db
      DB_USER: focusfriends
      DB_PASSWORD: focusfriends
      SOCIAL_SERVICE_URL: http://social-service:8083
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-dev-only-internal-secret-change-me-in-production}
    expose:
      - "8082"

  social-service:
    build: ./social-service
    container_name: focusfriends-social-service
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: social_db
      DB_USER: focusfriends
      DB_PASSWORD: focusfriends
      AUTH_SERVICE_URL: http://auth-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-dev-only-internal-secret-change-me-in-production}
    expose:
      - "8083"

  notification-service:
    build: ./notification-service
    container_name: focusfriends-notification-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: focusfriends
      DB_PASSWORD: focusfriends
      MAIL_ENABLED: "false"
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-dev-only-internal-secret-change-me-in-production}
    expose:
      - "8084"

  health-service:
    build: ./health-service
    container_name: focusfriends-health-service
    depends_on:
      postgres:
        condition: service_healthy
      social-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: health_db
      DB_USER: focusfriends
      DB_PASSWORD: focusfriends
      SOCIAL_SERVICE_URL: http://social-service:8083
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-dev-only-internal-secret-change-me-in-production}
    expose:
      - "8085"

  frontend:
    build: ./frontend
    container_name: focusfriends-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"

  gateway-service:
    build: ./gateway-service
    container_name: focusfriends-gateway-service
    depends_on:
      - auth-service
      - core-service
      - social-service
      - notification-service
      - health-service
      - frontend
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      CORE_SERVICE_URL: http://core-service:8082
      SOCIAL_SERVICE_URL: http://social-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      HEALTH_SERVICE_URL: http://health-service:8085
      FRONTEND_URL: http://frontend:80
      JWT_SECRET: ${JWT_SECRET:-this-is-a-dev-only-secret-key-change-me-in-production-please-32bytes}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-dev-only-internal-secret-change-me-in-production}
    # Единственный сервис (кроме frontend), чей порт публикуется наружу.
    ports:
      - "8080:8080"

volumes:
  pgdata:

